# ──────────────────────────────────────────────────────────────────────────────
# code-quality.yml
# Runs on every push and pull_request.
# Deeper quality checks: ESLint, TypeScript, Flake8, Black, Bandit.
# These are informational on feature branches but required on main/master.
# ──────────────────────────────────────────────────────────────────────────────

name: Code Quality

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Frontend quality — ESLint + TypeScript check
  # ─────────────────────────────────────────────
  frontend-quality:
    name: Frontend Quality
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: |
          if npm run | grep -q "^\s*lint\b"; then
            echo "Running ESLint..."
            npm run lint
          else
            echo "No lint script found — skipping ESLint."
          fi

      - name: TypeScript strict check
        run: |
          if [ -f tsconfig.json ]; then
            echo "Running tsc --noEmit..."
            npx tsc --noEmit
          else
            echo "tsconfig.json not found — skipping TypeScript check."
          fi

  # ─────────────────────────────────────────────
  # Backend quality — Flake8 + Black + Bandit
  # ─────────────────────────────────────────────
  backend-quality:
    name: Backend Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install quality tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black bandit

      # ── Flake8 ───────────────────────────────
      - name: Flake8 (style + errors)
        run: |
          echo "=== Flake8 (errors) ==="
          flake8 backend/src/ \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics

          echo "=== Flake8 (style, max-line 120) ==="
          flake8 backend/src/ \
            --count \
            --exit-zero \
            --max-line-length=120 \
            --statistics

      # ── Black ─────────────────────────────────
      - name: Black (format check)
        run: |
          echo "Checking formatting with Black..."
          # --check exits non-zero if any file would be reformatted
          # --diff shows what would change
          black backend/src/ \
            --check \
            --diff \
            --line-length 120 \
            || (echo "⚠ Black found formatting issues. Run: black backend/src/ --line-length 120" && exit 1)

      # ── Bandit ────────────────────────────────
      - name: Bandit (security scan)
        run: |
          echo "Running Bandit security scan..."
          bandit \
            -r backend/src/ \
            -ll \
            --format txt \
            --exit-zero \
            || true
          # Run again with severity HIGH/MEDIUM to fail on real issues
          bandit \
            -r backend/src/ \
            -lll \
            --format txt
